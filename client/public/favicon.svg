<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0e13"/>
  
  <!-- Grid lines (subtle) -->
  <line x1="4" y1="24" x2="28" y2="24" stroke="#1e2d40" stroke-width="0.5"/>
  <line x1="4" y1="18" x2="28" y2="18" stroke="#1e2d40" stroke-width="0.5"/>
  <line x1="4" y1="12" x2="28" y2="12" stroke="#1e2d40" stroke-width="0.5"/>

  <!-- Chart line (upward trend) -->
  <polyline
    points="4,24 8,22 11,20 13,21 16,17 19,15 22,11 25,9 28,7"
    stroke="#00d4aa"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Gradient fill under line -->
  <defs>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <polygon
    points="4,24 8,22 11,20 13,21 16,17 19,15 22,11 25,9 28,7 28,24"
    fill="url(#chartFill)"
  />

  <!-- Dot at latest data point -->
  <circle cx="28" cy="7" r="2" fill="#00d4aa"/>
  <circle cx="28" cy="7" r="1" fill="#0a0e13"/>

  <!-- X axis -->
  <line x1="4" y1="24" x2="28" y2="24" stroke="#2a4060" stroke-width="1"/>
</svg>
